name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4']
        appraisal: ['rails-6-1', 'rails-7-0', 'rails-7-1', 'rails-7-2']
        exclude:
          # Rails 6.1/7.0 need sqlite3 1.x and are not Ruby 3.4 targets
          - ruby: '3.4'
            appraisal: 'rails-6-1'
          - ruby: '3.4'
            appraisal: 'rails-7-0'
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libsqlite3-dev
          gem update --system
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Lint
        run: bundle exec rake lint

      - name: Test
        run: |
          bundle exec appraisal ${{ matrix.appraisal }} bundle install
          bundle exec appraisal ${{ matrix.appraisal }} rake test
